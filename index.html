<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Flappy TOTO 🐸</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bangers&family=Comic+Neue:wght@700&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body {
    width:100%; height:100%;
    background:#0d0d1a;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    font-family:'Bangers',cursive;
    overflow:hidden;
    touch-action:none;
  }
  #gameWrapper {
    position:relative;
    /* 9:16 ratio, max height 100vh */
    height: min(100vh, 100vw * 16/9);
    width: min(100vw, 100vh * 9/16);
  }
  #gameCanvas {
    width:100%; height:100%;
    border:3px solid #00ff88;
    border-radius:12px;
    box-shadow:0 0 30px #00ff8866, 0 0 60px #00ff8822;
    display:block;
  }
  #ui {
    position:absolute; top:0; left:0;
    width:100%; height:100%;
    pointer-events:none;
  }
  #score {
    position:absolute; top:3%; left:50%;
    transform:translateX(-50%);
    font-size:clamp(32px,8vw,56px);
    color:white;
    text-shadow:3px 3px 0 #000, 0 0 20px #00ff88;
  }
  .screen {
    position:absolute; top:0; left:0;
    width:100%; height:100%;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    background:rgba(0,0,0,0.85);
    border-radius:10px;
    pointer-events:all;
    cursor:pointer;
    gap: clamp(6px,2%,16px);
  }
  #startScreen h1 {
    font-size:clamp(36px,10vw,64px);
    color:#00ff88;
    text-shadow:4px 4px 0 #000;
    animation:bounce 0.6s infinite alternate;
  }
  .hint {
    font-size:clamp(14px,3.5vw,22px);
    color:#fff;
    text-shadow:2px 2px 0 #000;
    text-align:center;
    padding:0 10px;
  }
  .sub {
    font-size:clamp(11px,2.8vw,17px);
    color:#aaffcc;
    font-family:'Comic Neue',cursive;
    text-align:center;
    padding:0 10px;
  }
  #gameOverScreen { display:none; }
  #gameOverScreen h2 {
    font-size:clamp(28px,8vw,52px);
    color:#ff4444;
    text-shadow:3px 3px 0 #000;
    animation:shake 0.25s infinite;
    text-align:center;
  }
  #jumpscareImg {
    width: clamp(140px, 40%, 220px);
    aspect-ratio: 1/1.05;
    object-fit:cover; object-position: top;
    border-radius:12px;
    border:4px solid #ff4444;
    box-shadow:0 0 30px #ff4444;
    animation:jscare 0.35s ease-out;
  }
  #memeText {
    font-size:clamp(13px,3.5vw,20px);
    color:#ffdd00;
    font-family:'Comic Neue',cursive;
    text-shadow:1px 1px 0 #000;
    text-align:center;
  }
  #finalScore {
    font-size:clamp(18px,5vw,32px);
    color:#fff;
    text-shadow:2px 2px 0 #000;
  }
  #restartBtn {
    font-family:'Bangers',cursive;
    font-size:clamp(18px,5vw,28px);
    padding: clamp(8px,2%,12px) clamp(20px,6%,36px);
    background:#00ff88; border:none;
    border-radius:8px; cursor:pointer;
    color:#000; pointer-events:all;
    box-shadow:0 4px 0 #007744;
    transition:transform 0.1s;
  }
  #restartBtn:active { transform:translateY(3px); box-shadow:0 1px 0 #007744; }
  #footer {
    font-size:clamp(9px,2vw,13px);
    color:#aaffcc88; margin-top:6px;
    font-family:'Comic Neue',cursive;
    text-align:center;
  }
  @keyframes bounce { from{transform:translateY(0)} to{transform:translateY(-10px)} }
  @keyframes shake { 0%,100%{transform:translateX(-4px)} 50%{transform:translateX(4px)} }
  @keyframes jscare { 0%{transform:scale(0.2) rotate(-15deg);opacity:0} 70%{transform:scale(1.1) rotate(3deg)} 100%{transform:scale(1) rotate(0);opacity:1} }
</style>
</head>

function b64ToArrayBuffer(b64) {
  const bin = atob(b64);
  const buf = new ArrayBuffer(bin.length);
  const view = new Uint8Array(buf);
  for (let i = 0; i < bin.length; i++) view[i] = bin.charCodeAt(i);
  return buf;
}

async function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') await audioCtx.resume();
  // Decode all sounds
  [faahBuffer, getoutBuffer, bgmBuffer] = await Promise.all([
    audioCtx.decodeAudioData(b64ToArrayBuffer(faahB64)),
    audioCtx.decodeAudioData(b64ToArrayBuffer(getoutB64)),
    audioCtx.decodeAudioData(b64ToArrayBuffer(pehlaB64)),
  ]);
}

let faahBuffer = null, getoutBuffer = null;

function playSound(buffer, vol=1.0) {
  if (!audioCtx || !buffer) return;
  const src = audioCtx.createBufferSource();
  const gain = audioCtx.createGain();
  src.buffer = buffer;
  gain.gain.value = vol;
  src.connect(gain); gain.connect(audioCtx.destination);
  src.start(0);
}

function startBGM() {
  if (!audioCtx || !bgmBuffer || bgmStarted) return;
  bgmSource = audioCtx.createBufferSource();
  bgmGain = audioCtx.createGain();
  bgmSource.buffer = bgmBuffer;
  bgmSource.loop = true;
  bgmGain.gain.value = 0.75;
  bgmSource.connect(bgmGain); bgmGain.connect(audioCtx.destination);
  bgmSource.start(0);
  bgmStarted = true;
}

function stopBGM() {
  if (bgmGain && audioCtx) {
    bgmGain.gain.setValueAtTime(bgmGain.gain.value, audioCtx.currentTime);
    bgmGain.gain.linearRampToValueAtTime(0.15, audioCtx.currentTime + 0.3);
  }
}

function resumeBGM() {
  if (!bgmStarted) { startBGM(); return; }
  if (bgmGain && audioCtx) {
    bgmGain.gain.setValueAtTime(bgmGain.gain.value, audioCtx.currentTime);
    bgmGain.gain.linearRampToValueAtTime(0.75, audioCtx.currentTime + 0.5);
  }
}

function playFlap() {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain); gain.connect(audioCtx.destination);
  osc.frequency.setValueAtTime(500, audioCtx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(180, audioCtx.currentTime + 0.12);
  gain.gain.setValueAtTime(0.25, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.12);
  osc.start(); osc.stop(audioCtx.currentTime + 0.12);
}

// Game constants
const GROUND_H = 90;
const PIPE_W = 62;
const PIPE_GAP = 175;
const PIPE_SPEED = 3.2;

// Game state
let state = 'start';
let score = 0, bestScore = 0, frame = 0;

const bird = { x: 90, y: CH/2, vy: 0, gravity: 0.36, jump: -8.5, size: 58 };
let pipes = [];
let clouds = [
  {x:60,y:70,w:100}, {x:210,y:50,w:80}, {x:330,y:90,w:90}
];

const deathMsgs = [
  "Homework kiya tha? 😐",
  "Next time padh lena 📚",
  "TOTO disappointed hai 🐸",
  "Ma'am se maafi maango! 🙏",
  "Doraemon bhi fail ho jaata 😂",
  "Itna toh kar leta bhai 💀",
  "Attendance bhi nahi hai tera! 😂",
  "Class mein so raha tha? 😴"
];

function resetGame() {
  bird.y = CH/2; bird.vy = 0;
  pipes = []; score = 0; frame = 0;
  document.getElementById('score').textContent = '0';
}

function spawnPipe() {
  const minY = 90, maxY = CH - GROUND_H - PIPE_GAP - 90;
  const topH = Math.random() * (maxY - minY) + minY;
  pipes.push({x: CW + 10, topH, passed: false});
}

function drawSky() {
  const g = ctx.createLinearGradient(0,0,0,CH-GROUND_H);
  g.addColorStop(0,'#5ec8f0'); g.addColorStop(1,'#c9f0ff');
  ctx.fillStyle = g;
  ctx.fillRect(0,0,CW,CH-GROUND_H);
}

function drawClouds() {
  ctx.fillStyle = 'rgba(255,255,255,0.88)';
  clouds.forEach(c => {
    ctx.beginPath();
    ctx.ellipse(c.x, c.y, c.w/2, 24, 0, 0, Math.PI*2);
    ctx.ellipse(c.x+22, c.y-13, c.w/3, 19, 0, 0, Math.PI*2);
    ctx.ellipse(c.x-22, c.y-9, c.w/3.5, 16, 0, 0, Math.PI*2);
    ctx.fill();
  });
}

function drawGround() {
  ctx.fillStyle = '#5d4037';
  ctx.fillRect(0, CH-GROUND_H, CW, GROUND_H);
  ctx.fillStyle = '#4caf50';
  ctx.fillRect(0, CH-GROUND_H, CW, 20);
  // Dashes
  ctx.fillStyle = 'rgba(255,255,255,0.4)';
  for(let i = (frame*PIPE_SPEED)%70 - 70; i < CW; i+=70) {
    ctx.fillRect(i, CH-GROUND_H/2-5, 45, 10);
  }
  ctx.fillStyle = '#ffdd00';
  ctx.font = 'bold 14px Bangers, cursive';
  ctx.textAlign = 'center';
  ctx.fillText('🐸 NEXT TOPPERS JUNIORS 🐸', CW/2, CH-18);
}

function drawPipe(p) {
  // Top pipe
  const g1 = ctx.createLinearGradient(p.x,0,p.x+PIPE_W,0);
  g1.addColorStop(0,'#2e7d32'); g1.addColorStop(0.5,'#66bb6a'); g1.addColorStop(1,'#1b5e20');
  ctx.fillStyle = g1;
  ctx.fillRect(p.x, 0, PIPE_W, p.topH);
  ctx.fillStyle = '#388e3c';
  ctx.fillRect(p.x-6, p.topH-24, PIPE_W+12, 24);
  // Emoji on pipe
  ctx.font = '20px serif';
  ctx.textAlign = 'center';
  ctx.fillText('📝', p.x+PIPE_W/2, Math.max(p.topH/2, 30));

  // Bottom pipe
  const botY = p.topH + PIPE_GAP;
  const botH = CH - GROUND_H - botY;
  const g2 = ctx.createLinearGradient(p.x,0,p.x+PIPE_W,0);
  g2.addColorStop(0,'#2e7d32'); g2.addColorStop(0.5,'#66bb6a'); g2.addColorStop(1,'#1b5e20');
  ctx.fillStyle = g2;
  ctx.fillRect(p.x, botY, PIPE_W, botH);
  ctx.fillStyle = '#388e3c';
  ctx.fillRect(p.x-6, botY, PIPE_W+12, 24);
  ctx.font = '20px serif';
  ctx.fillText('📚', p.x+PIPE_W/2, botY + botH/2);
}

function drawBird() {
  const angle = Math.min(Math.max(bird.vy * 3, -30), 75) * Math.PI/180;
  ctx.save();
  ctx.translate(bird.x, bird.y);
  ctx.rotate(angle);
  if (totoImg.complete && totoImg.naturalWidth > 0) {
    ctx.drawImage(totoImg, -bird.size/2, -bird.size/2, bird.size, bird.size);
  } else {
    ctx.fillStyle = '#00c853';
    ctx.beginPath();
    ctx.ellipse(0, 0, 26, 22, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.ellipse(-9,-9,9,9,0,0,Math.PI*2);
    ctx.ellipse(9,-9,9,9,0,0,Math.PI*2);
    ctx.fill();
    ctx.fillStyle='#000';
    ctx.beginPath();
    ctx.ellipse(-9,-9,4,4,0,0,Math.PI*2);
    ctx.ellipse(9,-9,4,4,0,0,Math.PI*2);
    ctx.fill();
  }
  ctx.restore();
}

function checkCollision(p) {
  const pad = 10;
  const bL = bird.x - bird.size/2 + pad, bR = bird.x + bird.size/2 - pad;
  const bT = bird.y - bird.size/2 + pad, bB = bird.y + bird.size/2 - pad;
  if (bR > p.x && bL < p.x + PIPE_W) {
    if (bT < p.topH || bB > p.topH + PIPE_GAP) return true;
  }
  return false;
}

function die() {
  if (state === 'dead') return;
  state = 'dead';
  if (score > bestScore) bestScore = score;
  stopBGM();
  playSound(getoutBuffer, 1.0);
  const msg = deathMsgs[Math.floor(Math.random()*deathMsgs.length)];
  document.getElementById('memeText').textContent = msg;
  document.getElementById('finalScore').textContent = 'Score: '+score+'  |  Best: '+bestScore;
  const go = document.getElementById('gameOverScreen');
  go.style.display = 'flex';
}

function jump() {
  if (state === 'start') {
    state = 'playing';
    document.getElementById('startScreen').style.display = 'none';
    resetGame();
    startBGM();
  } else if (state === 'playing') {
    bird.vy = bird.jump;
    playFlap();
  }
}

// Restart button - isolated handler
document.getElementById('restartBtn').addEventListener('click', function(e) {
  e.stopPropagation();
  e.preventDefault();
  document.getElementById('gameOverScreen').style.display = 'none';
  resetGame();
  state = 'playing';
  resumeBGM();
}, true);

// Input handlers
document.addEventListener('keydown', e => {
  if (e.code === 'Space' || e.code === 'ArrowUp') {
    e.preventDefault();
    if (state !== 'dead') jump();
  }
});

canvas.addEventListener('click', e => {
  e.stopPropagation();
  if (state !== 'dead') jump();
});

document.getElementById('startScreen').addEventListener('click', e => {
  e.stopPropagation();
  jump();
});

document.addEventListener('touchstart', e => {
  // Don't handle if it's the restart button
  if (e.target.id === 'restartBtn') return;
  e.preventDefault();
  if (state !== 'dead') jump();
}, {passive: false});

// Init audio on first interaction
document.addEventListener('click', () => { if (!audioCtx) initAudio(); }, {once: false});
document.addEventListener('touchstart', () => { if (!audioCtx) initAudio(); }, {once: false, passive: true});

function loop() {
  ctx.clearRect(0,0,CW,CH);
  drawSky();
  clouds.forEach(c => { c.x -= 0.5; if(c.x+c.w<0) c.x=CW+c.w; });
  drawClouds();

  if (state === 'playing') {
    frame++;
    bird.vy += bird.gravity;
    bird.y += bird.vy;
    if (frame % 88 === 0) spawnPipe();

    pipes.forEach(p => {
      p.x -= PIPE_SPEED;
      drawPipe(p);
      if (!p.passed && p.x + PIPE_W < bird.x) {
        p.passed = true; score++;
        document.getElementById('score').textContent = score;
        playSound(faahBuffer, 0.3);
      }
      if (checkCollision(p)) die();
    });
    pipes = pipes.filter(p => p.x + PIPE_W > 0);

    if (bird.y + bird.size/2 >= CH - GROUND_H) { bird.y = CH-GROUND_H-bird.size/2; die(); }
    if (bird.y - bird.size/2 <= 0) { bird.y = bird.size/2; bird.vy = 2; }
  }

  drawGround();
  drawBird();
  requestAnimationFrame(loop);
}

loop();
</script>
